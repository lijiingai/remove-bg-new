<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 智能抠图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 900px;
            width: 100%;
            padding: 40px;
        }
        h1 { text-align: center; color: #333; margin-bottom: 10px; font-size: 2.5em; }
        .subtitle { text-align: center; color: #666; margin-bottom: 40px; }
        .upload-area {
            border: 3px dashed #ddd;
            border-radius: 15px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 30px;
        }
        .upload-area:hover { border-color: #667eea; background: #f8f9ff; }
        .upload-area.dragover { border-color: #667eea; background: #f0f2ff; }
        .upload-icon { font-size: 4em; margin-bottom: 20px; }
        .upload-text { font-size: 1.2em; color: #666; margin-bottom: 10px; }
        .upload-hint { color: #999; font-size: 0.9em; }
        input[type="file"] { display: none; }
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .btn:hover { transform: translateY(-2px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .result-area { display: none; margin-top: 30px; }
        .result-area.show { display: block; }
        .image-compare {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .image-box {
            border: 2px solid #eee;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
        }
        .image-box h3 { margin-bottom: 10px; color: #333; }
        .image-box img { max-width: 100%; border-radius: 8px; }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
            color: #667eea;
        }
        .loading.show { display: block; }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 AI 智能抠图</h1>
        <p class="subtitle">一键去除图片背景，快速高效</p>
        
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📸</div>
            <div class="upload-text">点击或拖拽上传图片</div>
            <div class="upload-hint">支持 JPG、PNG 格式</div>
            <input type="file" id="fileInput" accept="image/*">
        </div>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在处理中，请稍候...</p>
        </div>
        
        <div class="result-area" id="resultArea">
            <div class="image-compare">
                <div class="image-box">
                    <h3>原图</h3>
                    <img id="originalImg" src="" alt="原图">
                </div>
                <div class="image-box">
                    <h3>去背景后</h3>
                    <img id="resultImg" src="" alt="结果">
                </div>
            </div>
            <div style="text-align: center;">
                <button class="btn" onclick="downloadResult()">下载结果</button>
                <button class="btn" onclick="reset()" style="margin-left: 10px;">重新上传</button>
            </div>
        </div>
    </div>
    
    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const loading = document.getElementById('loading');
        const resultArea = document.getElementById('resultArea');
        const originalImg = document.getElementById('originalImg');
        const resultImg = document.getElementById('resultImg');
        let resultBlob = null;
        
        uploadArea.onclick = () => fileInput.click();
        
        fileInput.onchange = (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        };
        
        uploadArea.ondragover = (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        };
        
        uploadArea.ondragleave = () => {
            uploadArea.classList.remove('dragover');
        };
        
        uploadArea.ondrop = (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        };
        
        async function handleFile(file) {
            originalImg.src = URL.createObjectURL(file);
            uploadArea.style.display = 'none';
            loading.classList.add('show');
            
            const formData = new FormData();
            formData.append('image', file);
            
            try {
                const response = await fetch('/api/remove-bg', {
                    method: 'POST',
                    body: formData
                });
                
                if (response.ok) {
                    resultBlob = await response.blob();
                    resultImg.src = URL.createObjectURL(resultBlob);
                    loading.classList.remove('show');
                    resultArea.classList.add('show');
                } else {
                    alert('处理失败，请重试');
                    reset();
                }
            } catch (error) {
                alert('网络错误：' + error.message);
                reset();
            }
        }
        
        function downloadResult() {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(resultBlob);
            a.download = 'removed-bg.png';
            a.click();
        }
        
        function reset() {
            uploadArea.style.display = 'block';
            loading.classList.remove('show');
            resultArea.classList.remove('show');
            fileInput.value = '';
        }
    </script>
</body>
</html>
